<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supin Wheel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a2a6c, #112b3c, #000000);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 10px rgba(255, 154, 158, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .wheel-container {
            position: relative;
            width: 90vw;
            max-width: 350px;
            aspect-ratio: 1/1;
            margin-bottom: 40px;
        }

        .wheel-shadow {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2), inset 0 0 20px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 5;
            border: 8px solid #f8c291;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: #ff5252;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.5));
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform-origin: center center;
        }

        .spin-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            color: white;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            z-index: 10;
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .spin-btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
            transform: scale(1);
        }

        /* Popup Styles */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 999;
            backdrop-filter: blur(5px);
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .popup {
            background: linear-gradient(135deg, #ffffff 0%, #fff1eb 100%);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            width: 400px;
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            color: #333;
        }

        .overlay.active .popup {
            transform: scale(1);
        }

        .popup h2 {
            font-size: 2rem;
            color: #ff5252;
            margin-bottom: 10px;
        }

        .popup p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .popup-btn {
            background: #1abc9c;
            border: none;
            padding: 10px 30px;
            font-size: 1rem;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Simple CSS Confetti */
        .confetti-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(#ff5252 20%, transparent 20%),
                radial-gradient(#f1c40f 20%, transparent 20%),
                radial-gradient(#3498db 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px, 10px 5px;
            opacity: 0.1;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="confetti-bg"></div>

    <div class="header">
        <h1>Supin Wheel</h1>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel-shadow"></div>
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Putar Sekarang!</button>

    <div class="overlay" id="popupOverlay">
        <div class="popup">
            <h2>🎉 HOREE! 🎉</h2>
            <p><strong>Kue Tart!</strong><br><br>Selamat Ulang Tahun Bu Supi, panjang umur dan sehat selalu! Shareloc aja bu nanti kue nya dikirim🎂🥳</p>
            <button class="popup-btn" onclick="closePopup()">Tutup</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const popupOverlay = document.getElementById("popupOverlay");

        // Data segments
        const sectors = [
            "iPhone 17", 
            "Treadmil", 
            "Kue Tart", 
            "BYD Atto", 
            "Pempek Palembang", 
            "Voucher Alfamart 1jt", 
            "Umroh", 
            "Naik Gaji"
        ];
        
        // Warna profesional dan cerah
        const colors = ['#FF4757', '#FFA502', '#2ED573', '#1E90FF', '#9C88FF', '#FF6348', '#20BF6B', '#3742FA'];
        
        const PI = Math.PI;
        const arc = (2 * PI) / sectors.length;
        let currentRotation = 0;

        // Setup Audio Context untuk efek suara (Bypass batasan browser & auto-play)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // Menggambar Wheel
        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            sectors.forEach((sector, i) => {
                // Logika agar index 0 ("iPhone 17") tepat berada di posisi atas (12 o'clock) saat rotasi 0
                const angle = -PI/2 - arc/2 + (i * arc);

                // Gambar potongan kue (slice)
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arc);
                ctx.lineTo(centerX, centerY);
                ctx.fill();
                ctx.stroke();

                // Gambar Teks
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 16px 'Poppins', sans-serif";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 4;
                ctx.fillText(sector, radius - 30, 6);
                ctx.restore();
            });
        }

        drawWheel();

        // EFEK SUARA (Web Audio API Synthesizer)
        function playTick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playSlipSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.6); // Efek suara ngiung jatuh
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        function playWinSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            // Nada Tadaaa (Chord Mayor)
            const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'square';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.5);
                }, i * 150);
            });
        }

        // LOGIKA PUTARAN "PRANK"
        function spinWheel() {
            spinBtn.disabled = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // Skenario: Pilih mau pura-pura berhenti di iPhone (index 0) atau Umroh (index 6)
            const isFakeUmroh = Math.random() > 0.5; 
            
            // Putaran dasar (5 putaran penuh = 1800 derajat)
            let baseSpin = 1800; 
            
            // Tambahan derajat ke target palsu (iPhone = 0 deg, Umroh = 90 deg putaran rotasi dari posisi awal)
            let fakeTargetOffset = isFakeUmroh ? 90 : 0; 

            // Fase 1: Putar kencang dan berhenti di target palsu
            currentRotation += baseSpin + fakeTargetOffset;
            
            canvas.style.transition = 'transform 4s cubic-bezier(0.1, 0.8, 0.2, 1)';
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Mainkan suara putaran (tick) selama roda berputar
            let tickInterval = setInterval(playTick, 150);
            setTimeout(() => clearInterval(tickInterval), 3800); // Berhenti bunyi sebelum roda benar-benar diam

            // Fase 2: Efek "Terpeleset" ke Kue Tart
            setTimeout(() => {
                playSlipSound();
                
                // Kalkulasi rotasi tambahan untuk mencapai Kue Tart
                // Kue tart butuh rotasi 270 derajat dari titik 0. 
                // Jika dari iPhone (+270 deg), Jika dari Umroh (+180 deg)
                let finalOffset = isFakeUmroh ? 180 : 270;
                
                currentRotation += finalOffset;
                
                // Transisi lambat dan mulus (seolah roda keberatan/tergelincir)
                canvas.style.transition = 'transform 1.5s ease-in-out';
                canvas.style.transform = `rotate(${currentRotation}deg)`;

                // Fase 3: Tampilkan hasil akhirnya (Selalu Kue Tart)
                setTimeout(() => {
                    playWinSound();
                    popupOverlay.classList.add("active");
                    spinBtn.disabled = false;
                }, 1600); // Tunggu sampai roda benar-benar berhenti di Kue Tart

            }, 4200); // Tunggu 4.2 detik setelah fase 1 selesai
        }

        function closePopup() {
            popupOverlay.classList.remove("active");
        }
    </script>
</body>
</html>
